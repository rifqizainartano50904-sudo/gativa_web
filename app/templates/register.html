{% extends "base.html" %}
{% block content %}
<div style="display: grid; grid-template-columns: 1fr 1fr; height: 100vh; position: absolute; top: 0; left: 0; width: 100%; background: var(--brand-green-bg); color: #ffffff;">
    <!-- Left Side: Icon and Text -->
    <div style="background: rgba(0, 0, 0, 0.15); position: relative; border-right: 1px solid rgba(255, 255, 255, 0.1); display: flex; flex-direction: column; justify-content: center; padding: 64px;">
        <div style="font-size: 80px; color: var(--accent-primary); margin-bottom: 40px;">
            <i class="fa-solid fa-user-doctor"></i>
        </div>
        <h1 style="font-size: 56px; font-weight: 700; margin-bottom: 24px; line-height: 1.1; color: #fff; position: relative; z-index: 1;">Bergabung<br>Bersama Kami.</h1>
        <p style="font-size: 20px; color: rgba(255, 255, 255, 0.85); max-width: 450px; line-height: 1.6; position: relative; z-index: 1;">Daftarkan fasilitas kesehatan Anda untuk memantau asupan gizi pasien dengan lebih baik secara real-time.</p>
    </div>
    
    <!-- Right Side: Register Form -->
    <div style="display: flex; align-items: center; justify-content: center; padding: 48px; overflow-y: auto;">
        <div style="width: 100%; max-width: 400px; margin-top: auto; margin-bottom: auto;">
            <div style="text-align: left; margin-bottom: 32px;">
                <h2 class="text-gradient">Buat Akun Baru</h2>
                <p style="color: rgba(255,255,255,0.8); font-size: 14px;">Isi data di bawah untuk mendaftar</p>
            </div>

            <form method="POST" action="{{ url_for('auth.register') }}">
                <div class="form-group">
                    <label class="form-label" style="color: rgba(255,255,255,0.9);">Nama Lengkap / Username</label>
                    <input type="text" name="username" class="form-control" style="background: rgba(0,0,0,0.2); color: white; border-color: rgba(255,255,255,0.1);" required placeholder="Contoh: Dr. Budi">
                </div>
                <div class="form-group">
                    <label class="form-label" style="color: rgba(255,255,255,0.9);">Email</label>
                    <input type="email" name="email" class="form-control" style="background: rgba(0,0,0,0.2); color: white; border-color: rgba(255,255,255,0.1);" required placeholder="dokter@garda.id">
                </div>

                <div class="form-group" style="position: relative;">
                    <label class="form-label" style="color: rgba(255,255,255,0.9);">Password</label>
                    <input type="password" name="password" id="registerPassword" class="form-control" style="background: rgba(0,0,0,0.2); color: white; border-color: rgba(255,255,255,0.1); padding-right: 40px;" required placeholder="••••••••">
                    <i class="fa-solid fa-eye" id="toggleRegisterPassword" style="position: absolute; right: 15px; top: 38px; cursor: pointer; color: rgba(255,255,255,0.5);" onclick="togglePwd('registerPassword', 'toggleRegisterPassword')"></i>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 14px; font-size: 16px; margin-bottom: 16px; margin-top: 8px;">
                    Daftar Sekarang
                </button>
                <div style="text-align: center; font-size: 14px; color: rgba(255,255,255,0.8);">
                    Sudah punya akun? <a href="{{ url_for('auth.login') }}" style="color: var(--accent-primary); text-decoration: none; font-weight: 600;">Masuk di sini</a>
                </div>
            </form>
        </div>
    </div>
</div>
<script>
function togglePwd(inputId, iconId) {
    var input = document.getElementById(inputId);
    var icon = document.getElementById(iconId);
    if (input.type === "password") {
        input.type = "text";
        icon.classList.remove("fa-eye");
        icon.classList.add("fa-eye-slash");
    } else {
        input.type = "password";
        icon.classList.remove("fa-eye-slash");
        icon.classList.add("fa-eye");
    }
}
</script>
{% endblock %}
