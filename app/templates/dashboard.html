{% extends "base.html" %}

{% block content %}
<div class="dashboard-header" style="margin-bottom: 24px;">
    <h2 style="margin: 0; color: var(--text-primary);">Statistik Sistem</h2>
    <p style="color: var(--text-secondary); margin-top: 8px;">Ringkasan data pengguna di dalam sistem GARDA.</p>
</div>

<div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 24px; margin-bottom: 32px;">
    <!-- Card Pasien -->
    <div class="admin-card" style="display: flex; align-items: center; gap: 20px;">
        <div style="width: 56px; height: 56px; border-radius: 12px; background: rgba(16, 185, 129, 0.15); color: var(--accent-primary); display: flex; align-items: center; justify-content: center; font-size: 24px;">
            <i class="fa-solid fa-users"></i>
        </div>
        <div>
            <div style="color: var(--text-secondary); font-size: 14px; font-weight: 500;">Total Pasien</div>
            <div style="font-size: 28px; font-weight: 700; color: var(--text-primary); line-height: 1.2; margin-top: 4px;">{{ total_pasien }}</div>
        </div>
    </div>
    
    <!-- Card Tenaga Kesehatan -->
    <div class="admin-card" style="display: flex; align-items: center; gap: 20px;">
        <div style="width: 56px; height: 56px; border-radius: 12px; background: rgba(59, 130, 246, 0.15); color: #3b82f6; display: flex; align-items: center; justify-content: center; font-size: 24px;">
            <i class="fa-solid fa-user-doctor"></i>
        </div>
        <div>
            <div style="color: var(--text-secondary); font-size: 14px; font-weight: 500;">Tenaga Kesehatan</div>
            <div style="font-size: 28px; font-weight: 700; color: var(--text-primary); line-height: 1.2; margin-top: 4px;">{{ total_tk }}</div>
        </div>
    </div>
</div>

<div style="display: grid; grid-template-columns: 2fr 1fr; gap: 24px;">
    <div class="admin-card">
        <h3 style="margin-top: 0; margin-bottom: 24px;">Komparasi Pengguna (Bar)</h3>
        <div style="position: relative; height: 300px;">
            <canvas id="barChart"></canvas>
        </div>
    </div>
    
    <div class="admin-card">
        <h3 style="margin-top: 0; margin-bottom: 24px;">Distribusi (Pie)</h3>
        <div style="position: relative; height: 300px; display: flex; justify-content: center;">
            <canvas id="pieChart"></canvas>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const totalPasien = {{ total_pasien }};
    const totalTK = {{ total_tk }};
    
    // Bar Chart
    const ctxBar = document.getElementById('barChart').getContext('2d');
    new Chart(ctxBar, {
        type: 'bar',
        data: {
            labels: ['Pasien', 'Tenaga Kesehatan'],
            datasets: [{
                label: 'Jumlah Pengguna',
                data: [totalPasien, totalTK],
                backgroundColor: [
                    'rgba(16, 185, 129, 0.8)', // accent-primary (green)
                    'rgba(59, 130, 246, 0.8)'  // blue
                ],
                borderRadius: 6
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                y: {
                    beginAtZero: true,
                    ticks: {
                        stepSize: 1
                    }
                }
            },
            plugins: {
                legend: {
                    display: false
                }
            }
        }
    });

    // Pie Chart
    const ctxPie = document.getElementById('pieChart').getContext('2d');
    new Chart(ctxPie, {
        type: 'doughnut',
        data: {
            labels: ['Pasien', 'Tenaga Kesehatan'],
            datasets: [{
                data: [totalPasien, totalTK],
                backgroundColor: [
                    'rgba(16, 185, 129, 0.8)',
                    'rgba(59, 130, 246, 0.8)'
                ],
                borderWidth: 0
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            cutout: '65%',
            plugins: {
                legend: {
                    position: 'bottom'
                }
            }
        }
    });
});
</script>
{% endblock %}
