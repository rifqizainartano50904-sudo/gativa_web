{% extends "base.html" %}

{% block content %}
<div class="admin-card" style="margin-bottom: 24px;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
        <h2 style="margin: 0;">Data Pasien</h2>
    </div>

    <div style="overflow-x: auto;">
        <table style="width: 100%; border-collapse: collapse; min-width: 800px;">
            <thead>
                <tr style="border-bottom: 2px solid var(--surface-border);">
                    <th style="text-align: left; padding: 16px; color: var(--text-secondary); font-weight: 600;">Nama</th>
                    <th style="text-align: left; padding: 16px; color: var(--text-secondary); font-weight: 600;">Email</th>
                    <th style="text-align: left; padding: 16px; color: var(--text-secondary); font-weight: 600;">Password</th>
                    <th style="text-align: right; padding: 16px; color: var(--text-secondary); font-weight: 600;">Aksi</th>
                </tr>
            </thead>
            <tbody>
                {% for u in users %}
                <tr style="border-bottom: 1px solid var(--surface-border); transition: background 0.2s;" onmouseover="this.style.background='rgba(0,0,0,0.02)'" onmouseout="this.style.background='transparent'">
                    <td style="padding: 16px;">
                        <div style="font-weight: 600;">{{ u.get('name', 'N/A') }}</div>
                    </td>
                    <td style="padding: 16px; color: var(--text-secondary);">
                        {{ u.get('email', 'N/A') }}
                    </td>
                    <td style="padding: 16px; color: var(--text-secondary);">
                        ••••••••
                    </td>
                    <td style="padding: 16px; text-align: right;">
                        <button class="btn" style="background: var(--warning-bg); color: var(--warning-color); padding: 8px 12px;" 
                                onclick="openEditDataModal('{{ u.id }}', '{{ u.get('name', '') }}', '{{ u.get('email', '') }}')">
                            <i class="fa-solid fa-pen-to-square"></i> Edit
                        </button>
                    </td>
                </tr>
                {% else %}
                <tr>
                    <td colspan="4" style="padding: 32px; text-align: center; color: var(--text-secondary);">
                        Belum ada data pasien.
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

<!-- Edit Modal -->
<div id="editDataModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center;">
    <div class="admin-card" style="width: 100%; max-width: 500px; margin: 20px; animation: slideIn 0.3s ease-out;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
            <h3 style="margin: 0;" id="editModalTitle">Edit Data Pasien</h3>
            <button onclick="closeEditDataModal()" style="background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text-secondary);"><i class="fa-solid fa-xmark"></i></button>
        </div>
        
        <form id="editDataForm" method="POST" action="">
            <div class="form-group" style="margin-bottom: 16px;">
                <label class="form-label" style="font-weight: 600; margin-bottom: 8px;">Nama</label>
                <input type="text" name="name" id="editDataName" class="form-control">
            </div>
            <div class="form-group" style="margin-bottom: 16px;">
                <label class="form-label" style="font-weight: 600; margin-bottom: 8px;">Email</label>
                <input type="email" name="email" id="editDataEmail" class="form-control">
            </div>
            <div class="form-group" style="margin-bottom: 24px;">
                <label class="form-label" style="font-weight: 600; margin-bottom: 8px;">Password Baru (Kosongkan jika tidak ingin diubah)</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••">
            </div>
            <div style="display: flex; gap: 12px; justify-content: flex-end;">
                <button type="button" class="btn" style="background: var(--surface-border); color: var(--text-primary);" onclick="closeEditDataModal()">Batal</button>
                <button type="submit" class="btn btn-primary">Simpan Perubahan</button>
            </div>
        </form>
    </div>
</div>

<style>
@keyframes slideIn {
    from { transform: translateY(-20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}
</style>

<script>
function openEditDataModal(docId, name, email) {
    const modal = document.getElementById('editDataModal');
    const form = document.getElementById('editDataForm');
    
    document.getElementById('editDataName').value = name;
    document.getElementById('editDataEmail').value = email;
    
    form.action = '/edit_user_data/{{ collection }}/' + docId;
    
    modal.style.display = 'flex';
}

function closeEditDataModal() {
    const modal = document.getElementById('editDataModal');
    modal.style.display = 'none';
}
</script>
{% endblock %}
